<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Estoque</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <h1>Controle de Estoque</h1>

    <div class="form-grupo">
        <input id="nomeProduto" placeholder="Produto" autocomplete="off">
        <input id="categoriaProduto" placeholder="Categoria" autocomplete="off">
        <input id="quantidadeProduto" type="number" min="0" placeholder="Quantidade">
        <button id="adicionarProduto">Adicionar</button>
    </div>

    <h2>Estoque</h2>

    <div id="estoque"></div>

    <script src="js/app.js"></script>

</body>

</html>
